@if (loading()) {
  <p>Loading...</p>
} @else if (error()) {
  <p style="color: red">Failed to load weather data: {{ error() }}</p>
} @else {
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Temp (°C)</th>
        <th>Summary</th>
      </tr>
    </thead>
    <tbody>
      @for (f of forecasts(); track f.date) {
        <tr>
          <td>{{ f.date }}</td>
          <td>{{ f.temperatureC }}</td>
          <td>{{ f.summary }}</td>
        </tr>
      }
    </tbody>
  </table>
}
